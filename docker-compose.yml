services:
  json2at:
    build: .
    image: json2at:latest
    container_name: json2at
    restart: unless-stopped

    # docker compose 会自动读取同目录下的 .env 文件：
    # 1) 用于下面 ${PORT} 这类变量替换；
    # 2) 通过 env_file 把变量注入到容器运行环境中。
    env_file:
      - .env

    # 只绑定到本机回环地址，避免未加防护地暴露在公网/局域网。
    # 如需对外提供服务，建议在前面加 nginx/Caddy 等反向代理并配置 TLS，
    # 或者把 127.0.0.1 换成具体需要放行的地址。
    ports:
      - "127.0.0.1:${PORT:-3000}:${PORT:-3000}"

    # Dockerfile 中已定义 HEALTHCHECK，compose 会直接沿用，无需重复声明。
